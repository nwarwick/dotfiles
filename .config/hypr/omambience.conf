# Omambience keybindings.
# Sourced from hyprland.conf via:  source = ~/.config/hypr/omambience.conf

# Toggle each sound on/off.
bindd = SUPER ALT, 1, Toggle rain,     exec, $HOME/.local/bin/omambience-toggle rain
bindd = SUPER ALT, 2, Toggle fire,     exec, $HOME/.local/bin/omambience-toggle fire
bindd = SUPER ALT, 3, Toggle thunder,  exec, $HOME/.local/bin/omambience-toggle thunder
bindd = SUPER ALT, 4, Toggle waves,    exec, $HOME/.local/bin/omambience-toggle waves
bindd = SUPER ALT, 5, Toggle cafe,     exec, $HOME/.local/bin/omambience-toggle cafe
bindd = SUPER ALT, 0, Stop all sounds, exec, $HOME/.local/bin/omambience-stop-all

# Per-sound volume: SUPER+CTRL raises by 5, SUPER+CTRL+SHIFT lowers by 5.
# `binde` repeats while held — handy for nudging volume up/down.
# These combos avoid Omarchy's default movetoworkspace binds (SUPER+SHIFT+N
# and SUPER+SHIFT+ALT+N).
binde = SUPER CTRL,       1, exec, $HOME/.local/bin/omambience-volume rain    +5
binde = SUPER CTRL,       2, exec, $HOME/.local/bin/omambience-volume fire    +5
binde = SUPER CTRL,       3, exec, $HOME/.local/bin/omambience-volume thunder +5
binde = SUPER CTRL,       4, exec, $HOME/.local/bin/omambience-volume waves   +5
binde = SUPER CTRL,       5, exec, $HOME/.local/bin/omambience-volume cafe    +5
binde = SUPER CTRL SHIFT, 1, exec, $HOME/.local/bin/omambience-volume rain    -5
binde = SUPER CTRL SHIFT, 2, exec, $HOME/.local/bin/omambience-volume fire    -5
binde = SUPER CTRL SHIFT, 3, exec, $HOME/.local/bin/omambience-volume thunder -5
binde = SUPER CTRL SHIFT, 4, exec, $HOME/.local/bin/omambience-volume waves   -5
binde = SUPER CTRL SHIFT, 5, exec, $HOME/.local/bin/omambience-volume cafe    -5
